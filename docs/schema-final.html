body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:#0d1117;color:#e6edf3;height:100vh;overflow:hidden;user-select:none}

#world{position:absolute;transform-origin:0 0}

.edge-ref{stroke:#d2a8ff;stroke-width:2;stroke-dasharray:7,5;fill:none;opacity:.55}

.coll-header{padding:10px 14px 8px;display:flex;align-items:center;gap:8px;cursor:pointer}

.coll-toggle{font-size:11px;color:#484f58;cursor:pointer;padding:2px 6px;transition:transform .2s}
.coll-block.open .coll-toggle{transform:rotate(90deg)}
.coll-body{display:none;padding:0 10px 10px}
.coll-block.open .coll-body{display:block}
.frow{display:flex;align-items:baseline;gap:4px;padding:2px 6px;font-size:10px;line-height:1.5;border-radius:3px}

.fnt{color:#484f58;font-size:9px;flex-shrink:0}

.fb-req{background:#3fb95018;color:#7ee787;border:1px solid #3fb95022}
.fb-idx{background:#f0a84c18;color:#f0a84c;border:1px solid #f0a84c22}
.fb-uniq{background:#d2a8ff18;color:#d2a8ff;border:1px solid #d2a8ff22}
.fb-ref{background:#d2a8ff18;color:#d2a8ff;border:1px solid #d2a8ff22}

.embed-accent{width:3px;height:16px;border-radius:2px;flex-shrink:0}

.embed-kind{font-size:8px;color:#484f58;padding:1px 4px;border-radius:3px;background:#161b22}
.embed-toggle{font-size:10px;color:#484f58;transition:transform .15s}
.embed-block.open .embed-toggle{transform:rotate(90deg)}
.embed-body{display:none;padding:2px 4px 6px}

.depth-2>.embed-header{background:#8957e508}.depth-2{border-color:#8957e522}.depth-2>.embed-header .embed-accent{background:#8957e5}
.depth-3>.embed-header{background:#f0a84c08}.depth-3{border-color:#f0a84c22}.depth-3>.embed-header .embed-accent{background:#f0a84c}

.poly-label{font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:#484f58;padding:6px 8px 2px;font-weight:600}
#legend{position:fixed;bottom:12px;left:12px;background:#161b22ee;border:1px solid #30363d;border-radius:8px;padding:10px 14px;z-index:100;font-size:10px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}

.leg-line{width:20px;height:0;border-top:2px dashed #d2a8ff;opacity:.5}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

// ── RENDERING ──
const world=document.getElementById('world');

function rF(f){
  let cls='fn-opt',badges='';
  if(f.ref){cls='fn-ref';badges+='<span class="fbadge fb-ref">REF</span>';}
  else if(f.req){cls='fn-req';}
  if(f.idx)badges+='<span class="fbadge fb-idx">IDX</span>';
  if(f.note?.includes('unique'))badges+='<span class="fbadge fb-uniq">UNQ</span>';
  const nt=f.note&&!f.note.includes('unique')?`<span class="fnt">${f.note}</span>`:'';
  return `<div class="frow"><span class="fn ${cls}">${f.n}</span>${badges}${nt}<span class="ft">${f.t||''}</span></div>`;
}

function rE(embeds,d){
  if(!embeds?.length)return '';
  let h='';
  embeds.forEach(e=>{h+=e.isPoly?rP(e,d):rS(e,d);});
  return h;
}

function rS(e,d){
  const dc=Math.min(d,4);
  let inner='';
  if(e.fields)e.fields.forEach(f=>inner+=rF(f));
  if(e.embeds)inner+=rE(e.embeds,d+1);
  return `<div class="embed-block depth-${dc}" data-depth="${d}">
    <div class="embed-header" onclick="this.parentElement.classList.toggle('open')">
      <div class="embed-accent"></div>
      <span class="embed-name">${e.name}</span>
      <span class="embed-kind">${e.kind||''}</span>
      <span class="embed-toggle">▶</span>
    </div><div class="embed-body">${inner}</div></div>`;
}

function rP(e,d){
  const dc=Math.min(d,4);
  let inner='<div class="poly-label">Polymorph — einer der folgenden Typen:</div>';
  e.polyOptions.forEach(o=>{
    let oi='';
    if(o.fields)o.fields.forEach(f=>oi+=rF(f));
    if(o.embeds)oi+=rE(o.embeds,d+2);
    inner+=`<div class="embed-block depth-${Math.min(d+1,4)}" data-depth="${d+1}">
      <div class="embed-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="embed-accent"></div>
        <span class="embed-name">${o.name}</span>
        <span class="embed-kind">polymorph option</span>
        <span class="embed-toggle">▶</span>
      </div><div class="embed-body">${oi}</div></div>`;
  });
  return `<div class="embed-block depth-${dc}" data-depth="${d}">
    <div class="embed-header" onclick="this.parentElement.classList.toggle('open')">
      <div class="embed-accent"></div>
      <span class="embed-name">${e.name}</span>
      <span class="embed-kind">${e.kind||'polymorph'}</span>
      <span class="embed-toggle">▶</span>
    </div><div class="embed-body">${inner}</div></div>`;
}

C.forEach(c=>{
  const el=document.createElement('div');
  el.className='coll-block open';
  el.style.cssText=`left:${c.x}px;top:${c.y}px;width:${c.w}px;border-color:${c.color}66`;
  let fh='';c.fields.forEach(f=>fh+=rF(f));
  el.innerHTML=`<div class="coll-header" onclick="this.parentElement.classList.toggle('open')">
    <div class="coll-accent" style="background:${c.color}"></div>
    <span class="coll-title">${c.id}</span>
    <span class="coll-kind">${c.kind}</span>
    <span class="coll-toggle">▶</span>
  </div><div class="coll-body">${fh}${rE(c.embeds,1)}</div>`;
  world.appendChild(el);
});

// ── DRAW REFS ──
function getA(id,s){const c=C.find(x=>x.id===id);if(!c)return{x:0,y:0};switch(s){case'right':return{x:c.x+c.w,y:c.y+24};case'left':return{x:c.x,y:c.y+24};case'top':return{x:c.x+c.w/2,y:c.y};case'bottom':return{x:c.x+c.w/2,y:c.y+50};default:return{x:c.x+c.w/2,y:c.y+24};}}
(function(){
  const svg=document.getElementById('edgeSvg');
  REFS.forEach(r=>{
    const a=getA(r.from,r.fromSide),b=getA(r.to,r.toSide);
    const dx=b.x-a.x,dy=b.y-a.y,ih=r.fromSide==='right'||r.fromSide==='left';
    const cx1=ih?a.x+dx*.5:a.x,cy1=ih?a.y:a.y+dy*.5,cx2=ih?b.x-dx*.5:b.x,cy2=ih?b.y:b.y-dy*.5;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${a.x},${a.y} C${cx1},${cy1} ${cx2},${cy2} ${b.x},${b.y}`);
    p.setAttribute('class','edge-ref');svg.appendChild(p);
    const an=Math.atan2(b.y-cy2,b.x-cx2),hs=8;
    const tri=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    tri.setAttribute('points',`${b.x},${b.y} ${b.x-hs*Math.cos(an-.4)},${b.y-hs*Math.sin(an-.4)} ${b.x-hs*Math.cos(an+.4)},${b.y-hs*Math.sin(an+.4)}`);
    tri.setAttribute('class','edge-ref-head');svg.appendChild(tri);
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2-8;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',mx);t.setAttribute('y',my);t.setAttribute('text-anchor','middle');t.setAttribute('class','edge-label');t.textContent=r.label;svg.appendChild(t);
  });
})();

// ── TOOLBAR ──
function toggleAll(o){document.querySelectorAll('.coll-block,.embed-block').forEach(e=>{if(o)e.classList.add('open');else e.classList.remove('open');});}
function toggleDepth(m){document.querySelectorAll('.coll-block').forEach(e=>e.classList.add('open'));document.querySelectorAll('.embed-block').forEach(e=>{const d=parseInt(e.dataset.depth)||1;if(d<=m)e.classList.add('open');else e.classList.remove('open');});}

// ── PAN & ZOOM ──
const cv=document.getElementById('cv'),wEl=document.getElementById('world');
let scale=1,panX=0,panY=0,dragging=false,lMX=0,lMY=0;
cv.addEventListener('mousedown',e=>{if(e.target.closest('.coll-block')||e.target.closest('#legend'))return;dragging=true;lMX=e.clientX;lMY=e.clientY;cv.classList.add('grab');});
window.addEventListener('mousemove',e=>{if(!dragging)return;panX+=e.clientX-lMX;panY+=e.clientY-lMY;lMX=e.clientX;lMY=e.clientY;aT();});
window.addEventListener('mouseup',()=>{dragging=false;cv.classList.remove('grab');});
cv.addEventListener('wheel',e=>{e.preventDefault();const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,d=e.deltaY<0?1.1:.91,ns=Math.min(3,Math.max(.15,scale*d));panX=mx-(mx-panX)*(ns/scale);panY=my-(my-panY)*(ns/scale);scale=ns;aT();},{passive:false});
function aT(){wEl.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;}
function resetView(){const r=cv.getBoundingClientRect();scale=Math.min(r.width/1580,r.height/1150,1)*.9;panX=(r.width-1550*scale)/2;panY=10;aT();}
resetView();toggleDepth(1);
</script>

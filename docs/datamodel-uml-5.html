<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>WheresMyTomato – Datenmodell</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:#0d1117;color:#e6edf3;height:100vh;overflow:hidden;user-select:none}

/* ── TOOLBAR ── */
#bar{position:fixed;top:0;left:0;right:0;height:48px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:7px;padding:0 12px;z-index:300}
#search{width:200px;padding:5px 10px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#e6edf3;font-size:12px;outline:none}
#search:focus{border-color:#58a6ff}
#search::placeholder{color:#484f58}
.tag{font-size:11px;padding:3px 8px;border-radius:12px;cursor:pointer;border:1px solid transparent;transition:opacity .12s;white-space:nowrap}
.tag.on{opacity:1}.tag.off{opacity:.3}
.t-off{background:#388bfd18;color:#79c0ff;border-color:#388bfd33}
.t-bri{background:#8957e518;color:#d2a8ff;border-color:#8957e533}
.t-tom{background:#3fb95018;color:#7ee787;border-color:#3fb95033}
.t-col{background:#58c0fc18;color:#58c0fc;border-color:#58c0fc33}
.t-sta{background:#1D9E7518;color:#56d364;border-color:#1D9E7533}
.t-qua{background:#BA751718;color:#f0a84c;border-color:#BA751733}
.t-use{background:#D4537E18;color:#f778ba;border-color:#D4537E33}
.t-enu{background:#D85A3018;color:#ffa198;border-color:#D85A3033}
.sep{width:1px;height:24px;background:#30363d;flex-shrink:0}
#inf{font-size:11px;color:#484f58;margin-left:auto;white-space:nowrap}
#btn-reset{padding:4px 10px;border:1px solid #30363d;border-radius:6px;background:transparent;color:#8b949e;font-size:11px;cursor:pointer;flex-shrink:0}
#btn-reset:hover{border-color:#58a6ff;color:#58a6ff}

/* ── CANVAS ── */
#cv{position:fixed;top:48px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
#cv.grab{cursor:grabbing}
#world{position:absolute;transform-origin:0 0}

/* ── GROUP LABELS ── */
.glabel{position:absolute;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;opacity:.35;pointer-events:none;white-space:nowrap}

/* ── NODE ── */
.node{position:absolute;width:256px;border-radius:8px;border:1px solid #30363d;background:#161b22;cursor:pointer;transition:border-color .12s,box-shadow .12s,opacity .15s}
.node:hover{border-color:#444c56;z-index:10}
.node.sel{border-color:#58a6ff !important;box-shadow:0 0 0 2px rgba(88,166,255,.22);z-index:50}
.node.rel{border-color:#3fb95066;z-index:20}
.node.dim{opacity:.12;pointer-events:none}

/* header */
.nh{padding:7px 10px 6px;border-radius:8px 8px 0 0;display:flex;align-items:center;gap:6px}
.g-off .nh{background:#388bfd12}.g-bridge .nh{background:#8957e512}.g-tomapo .nh{background:#3fb95012}
.g-cold .nh{background:#58c0fc12}.g-station .nh{background:#1D9E7512}.g-quality .nh{background:#BA751712}
.g-user .nh{background:#D4537E12}.g-enum .nh{background:#D85A3012}
.na{width:3px;height:22px;border-radius:2px;flex-shrink:0}
.g-core .na{background:#3fb950}.g-product .na{background:#388bfd}.g-station .na{background:#1D9E75}
.g-quality .na{background:#BA7517}.g-cold .na{background:#58c0fc}.g-alert .na{background:#f78166}
.g-user .na{background:#D4537E}.g-service .na{background:#8957e5}.g-enum .na{background:#D85A30}
.ntitle{font-size:11.5px;font-weight:600;color:#f0f6fc;flex:1;line-height:1.2}
.nkind{font-size:8.5px;color:#484f58;padding:1px 4px;border-radius:3px;background:#0d1117;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis}
/* connection count badge */
.nbadge{font-size:9px;padding:1px 5px;border-radius:8px;background:#21262d;color:#6e7681;flex-shrink:0;cursor:pointer}
.node.sel .nbadge{background:#388bfd22;color:#79c0ff}

/* fields */
.nf{border-top:1px solid #21262d;padding:3px 0;display:none}
.node.open .nf{display:block}
.frow{display:flex;align-items:baseline;gap:3px;padding:1px 9px;font-size:10px;line-height:1.45}
.frow:hover{background:#1c2128}
.fn{color:#79c0ff;font-family:'SF Mono','Fira Code',monospace;font-size:9.5px;flex-shrink:0}
.fn.ice{color:#58c0fc}.fn.dim{color:#6e7681;font-style:italic}
.ft{color:#484f58;font-family:'SF Mono','Fira Code',monospace;font-size:9px;margin-left:auto;flex-shrink:0;padding-left:3px}
.fnt{color:#484f58;font-size:9px}

/* enum cases */
.ecases{padding:5px 9px 7px;border-top:1px solid #21262d;display:none;flex-wrap:wrap;gap:3px}
.node.open .ecases{display:flex}
.ec{font-size:9px;font-family:'SF Mono','Fira Code',monospace;color:#d2a8ff;background:#8957e510;padding:1px 5px;border-radius:3px;border:1px solid #8957e522}
.g-enum .ec{color:#ffa198;background:#D85A3010;border-color:#D85A3022}

/* ── SIDE PANEL ── */
#panel{position:fixed;top:48px;right:0;width:300px;bottom:0;background:#161b22;border-left:1px solid #30363d;z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s}
#panel.open{transform:translateX(0)}
#ph{padding:14px 16px 10px;border-bottom:1px solid #21262d;display:flex;align-items:flex-start;gap:8px}
#ph-name{font-size:13px;font-weight:600;color:#f0f6fc;flex:1;line-height:1.3}
#ph-kind{font-size:10px;color:#6e7681;margin-top:2px}
#ph-close{font-size:16px;color:#6e7681;cursor:pointer;padding:2px 4px;line-height:1;flex-shrink:0}
#ph-close:hover{color:#f0f6fc}
#plist{flex:1;overflow-y:auto;padding:8px 0}
.psec{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#484f58;padding:10px 16px 4px}
.prow{padding:6px 16px;cursor:pointer;border-bottom:1px solid #21262d22;transition:background .1s}
.prow:hover{background:#21262d}
.prow-label{font-size:9.5px;color:#6e7681;margin-bottom:2px}
.prow-name{font-size:11px;font-weight:600;color:#e6edf3;display:flex;align-items:center;gap:5px}
.prow-name .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.prow-rel{font-size:9px;color:#484f58;font-family:'SF Mono','Fira Code',monospace;margin-top:1px}
#pempty{padding:24px 16px;font-size:11px;color:#484f58;text-align:center;line-height:1.6}
</style>
</head>
<body>

<div id="bar">
  <input id="search" placeholder="Struct oder Feld suchen…" oninput="doSearch()">
  <div class="sep"></div>
  <span class="tag t-off on" data-g="off"     onclick="toggleTag(this)">OFF</span>
  <span class="tag t-bri on" data-g="bridge"  onclick="toggleTag(this)">Bridge</span>
  <span class="tag t-tom on" data-g="tomapo"  onclick="toggleTag(this)">Tomapo</span>
  <span class="tag t-col on" data-g="cold"    onclick="toggleTag(this)">🧊 Kühlung</span>
  <span class="tag t-sta on" data-g="station" onclick="toggleTag(this)">Stationen</span>
  <span class="tag t-qua on" data-g="quality" onclick="toggleTag(this)">Qualität</span>
  <span class="tag t-use on" data-g="user"    onclick="toggleTag(this)">User</span>
  <span class="tag t-enu on" data-g="enum"    onclick="toggleTag(this)">Enums</span>
  <div class="sep"></div>
  <button id="btn-reset" onclick="resetView()">Reset</button>
  <span id="inf">Klick = Felder · Badge = Verbindungen</span>
</div>

<!-- Side panel: connections of selected node -->
<div id="panel">
  <div id="ph">
    <div><div id="ph-name">–</div><div id="ph-kind"></div></div>
    <div id="ph-close" onclick="closePanel()">✕</div>
  </div>
  <div id="plist"><div id="pempty">Wähle einen Node um seine<br>Verbindungen zu sehen</div></div>
</div>

<div id="cv">
  <div id="world"></div>
</div>

<script>
const MODEL = {
  groups:[
    {id:"core",    label:"Tomapo Core",    color:"#3fb950"},
    {id:"product", label:"Produktdaten",   color:"#388bfd"},
    {id:"station", label:"Stationen",      color:"#1D9E75"},
    {id:"quality", label:"Qualität",       color:"#BA7517"},
    {id:"cold",    label:"Kühlkette",      color:"#58c0fc"},
    {id:"alert",   label:"Alerts",         color:"#f78166"},
    {id:"user",    label:"User Layer",     color:"#D4537E"},
    {id:"service", label:"Service/State",  color:"#8957e5"},
    {id:"enum",    label:"Enums",          color:"#D85A30"},
  ],
  nodes:[
  // ── CORE ──────────────────────────────────────────────────────────
  {id:"TomapoResponse",g:"core",kind:"struct · Haupt-Einstiegspunkt",fields:[
    // Identität
    {n:"barcode",t:"String"},{n:"batchId",t:"String?"},{n:"generatedAt",t:"Date"},
    // Produkt
    {n:"productName",t:"String?"},{n:"genericName",t:"String?"},{n:"brands",t:"String?"},
    {n:"quantity",t:"String?"},{n:"productQuantity",t:"Double?"},{n:"productQuantityUnit",t:"String?"},
    {n:"servingSize",t:"String?"},{n:"servingQuantity",t:"Double?"},{n:"storesTags",t:"[String]?"},
    // Bilder
    {n:"imageUrl",t:"String?"},{n:"imageFrontUrl",t:"String?"},{n:"imageIngredientsUrl",t:"String?"},
    {n:"imageNutritionUrl",t:"String?"},{n:"imagePackagingUrl",t:"String?"},
    // Kategorisierung
    {n:"categoriesTags",t:"[String]?"},{n:"foodGroupsTags",t:"[String]?"},{n:"foodGroups",t:"String?"},
    {n:"pnnsGroups1",t:"String?"},{n:"pnnsGroups2",t:"String?"},
    // Scores
    {n:"nutriscoreGrade",t:"String?",note:"a–e/unknown"},{n:"nutriscoreScore",t:"Int?"},
    {n:"ecoscoreGrade",t:"String?",note:"a–e/not-applicable"},{n:"ecoscoreScore",t:"Int?"},
    {n:"novaGroup",t:"Int?",note:"1–4"},{n:"novaGroupError",t:"String?"},
    // Nährwerte
    {n:"nutriments",t:"ProductNutriments?"},{n:"nutrientLevels",t:"ProductNutrientLevels?"},
    // Zutaten (Rohliste)
    {n:"ingredientsText",t:"String?"},{n:"rawIngredients",t:"[RawIngredient]?"},
    {n:"ingredientsN",t:"Int?"},{n:"additivesN",t:"Int?"},{n:"additivesTags",t:"[String]?"},
    // Allergene & Diät
    {n:"allergensTags",t:"[String]?"},{n:"tracesTags",t:"[String]?"},{n:"ingredientsAnalysisTags",t:"[String]?"},
    // Labels & Herkunft
    {n:"labelsTags",t:"[String]?"},{n:"countriesTags",t:"[String]?"},{n:"originsTags",t:"[String]?"},
    {n:"manufacturingPlaces",t:"String?"},{n:"manufacturingPlacesTags",t:"[String]?"},
    // Verpackung
    {n:"packagingTags",t:"[String]?"},{n:"packagings",t:"[ProductPackaging]?"},
    {n:"packagingText",t:"String?"},{n:"conservationConditions",t:"String?"},
    // Datenqualität
    {n:"dataQualityErrorsTags",t:"[String]?"},{n:"dataQualityWarningsTags",t:"[String]?"},
    {n:"completeness",t:"Double?",note:"0–1"},
    // Tomapo-Kern
    {n:"alerts",t:"[TomapoProductAlert]"},{n:"stations",t:"[TomapoStation]"},
    {n:"environmentSummary",t:"TomapoEnvironmentSummary"},{n:"certifications",t:"[TomapoCertification]"},
    {n:"traceabilityScore",t:"TomapoTraceabilityScore"},{n:"dataSources",t:"[TomapoDataSource]"},
    {n:"ingredients",t:"[ProductIngredient]"},
    {n:"requiresColdChain",t:"Bool",cold:true},{n:"coldChainSummary",t:"TomapoColdChainSummary",cold:true},
    // Computed
    {n:"recallStatus",t:"TomapoRecallStatus",comp:true,note:"legacy"},{n:"activeAlerts",t:"[TomapoProductAlert]",comp:true},
    {n:"nova",t:"NovaGroup",comp:true},{n:"nutri",t:"NutriScore",comp:true},{n:"eco",t:"NutriScore",comp:true},
    {n:"hasReliableNutritionData",t:"Bool",comp:true},{n:"hasDataErrors",t:"Bool",comp:true},
    {n:"veganStatus",t:"DietStatus",comp:true},{n:"displayImageUrl",t:"String?",comp:true},
    {n:"hasActiveRecall",t:"Bool",comp:true},{n:"refrigeratedStations",t:"[TomapoStation]",comp:true,cold:true},
    {n:"subProductIngredients",t:"[SubProductIngredient]",comp:true},
    {n:"chemicalIngredients",t:"[ChemicalIngredient]",comp:true},
  ]},
  {id:"TomapoTraceabilityScore",g:"core",kind:"struct",fields:[
    {n:"completeness",t:"Double",note:"0–1"},{n:"verifiedStations",t:"Int"},{n:"unknownStations",t:"Int"},
    {n:"hasGaps",t:"Bool"},{n:"isThirdPartyVerified",t:"Bool"},{n:"blockchainHash",t:"String?"},
  ]},
  {id:"TomapoDataSource",g:"core",kind:"struct",fields:[
    {n:"id",t:"String"},{n:"name",t:"String"},{n:"type",t:"DataSourceType"},{n:"lastSynced",t:"Date?"},{n:"reliability",t:"DataSourceReliability"},
  ]},
  {id:"TomapoRecallStatus",g:"core",kind:"struct · legacy",fields:[
    {n:"isRecalled",t:"Bool"},{n:"severity",t:"RecallSeverity"},{n:"recallId",t:"String?"},
    {n:"affectedBatches",t:"[String]?"},{n:"reason",t:"String?"},{n:"issuedBy",t:"String?"},
    {n:"issuedAt",t:"Date?"},{n:"actionRequired",t:"String?"},{n:"moreInfoUrl",t:"String?"},
  ]},

  // ── PRODUCT DATA ──────────────────────────────────────────────────
  {id:"ProductNutriments",g:"product",kind:"struct",fields:[
    {n:"energyKcal100g",t:"Double?"},{n:"energyKj100g",t:"Double?"},{n:"energyKcalServing",t:"Double?"},{n:"energyKjServing",t:"Double?"},
    {n:"fat100g",t:"Double?"},{n:"saturatedFat100g",t:"Double?"},{n:"fatServing",t:"Double?"},{n:"saturatedFatServing",t:"Double?"},
    {n:"carbohydrates100g",t:"Double?"},{n:"sugars100g",t:"Double?"},{n:"fiber100g",t:"Double?"},
    {n:"addedSugars100g",t:"Double?"},{n:"starch100g",t:"Double?"},
    {n:"carbohydratesServing",t:"Double?"},{n:"sugarsServing",t:"Double?"},{n:"fiberServing",t:"Double?"},
    {n:"proteins100g",t:"Double?"},{n:"proteinsServing",t:"Double?"},
    {n:"salt100g",t:"Double?"},{n:"sodium100g",t:"Double?"},{n:"saltServing",t:"Double?"},{n:"sodiumServing",t:"Double?"},
    {n:"novaGroup100g",t:"Double?"},
    {n:"hasSuspiciousSaltValue",t:"Bool",comp:true},{n:"hasSuspiciousMacroSum",t:"Bool",comp:true},
    {n:"hasMeaningfulNutritionData",t:"Bool",comp:true},
  ]},
  {id:"ProductNutrientLevels",g:"product",kind:"struct",fields:[
    {n:"fat",t:"String?",note:"low/moderate/high"},{n:"saturatedFat",t:"String?"},{n:"sugars",t:"String?"},{n:"salt",t:"String?"},
  ]},
  {id:"RawIngredient",g:"product",kind:"struct · rekursiv",fields:[
    {n:"id",t:"String?"},{n:"text",t:"String?"},{n:"percent",t:"Double?"},{n:"percentEstimate",t:"Double?"},
    {n:"percentMin",t:"Double?"},{n:"percentMax",t:"Double?"},{n:"vegan",t:"String?"},{n:"vegetarian",t:"String?"},
    {n:"fromPalmOil",t:"String?"},{n:"ingredients",t:"[RawIngredient]?",note:"rekursiv"},
  ]},
  {id:"ProductPackaging",g:"product",kind:"struct",fields:[
    {n:"material",t:"String?"},{n:"shape",t:"String?"},{n:"recycling",t:"String?"},
    {n:"weightMeasured",t:"Double?"},{n:"numberOfUnits",t:"Int?"},{n:"quantityPerUnit",t:"String?"},
    {n:"foodContact",t:"Int?"},{n:"nonRecyclableAndNonBiodegradable",t:"String?"},
    {n:"environmentalScoreMaterialScore",t:"Int?"},
  ]},

  // ── INGREDIENTS ───────────────────────────────────────────────────
  {id:"ProductIngredient",g:"product",kind:"enum · 2 cases",
   fields:[{n:"id",t:"String",comp:true},{n:"displayName",t:"String",comp:true},{n:"isTraceable",t:"Bool",comp:true}],
   cases:[".subProduct(SubProductIngredient)",".chemical(ChemicalIngredient)"]},
  {id:"SubProductIngredient",g:"product",kind:"struct",fields:[
    {n:"id",t:"String"},{n:"barcode",t:"String",note:"→ GET /api/v1/trace/{barcode}"},
    {n:"batchId",t:"String?"},{n:"name",t:"String"},{n:"description",t:"String?"},
    {n:"category",t:"SubProductCategory"},{n:"percentageInProduct",t:"Double?"},
    {n:"originCountry",t:"String?"},{n:"originRegion",t:"String?"},
    {n:"supplierName",t:"String?"},{n:"supplierCountry",t:"String?"},{n:"imageUrl",t:"String?"},
    {n:"certifications",t:"[TomapoCertification]"},
    {n:"traceData",t:"TomapoResponse?",note:"nil=nicht trackbar · rekursiv"},
    {n:"isTraceable",t:"Bool",comp:true},{n:"displayOrigin",t:"String?",comp:true},
  ]},
  {id:"ChemicalIngredient",g:"product",kind:"struct",fields:[
    {n:"id",t:"String"},{n:"eNumber",t:"String?",note:"E471…"},{n:"name",t:"String"},
    {n:"description",t:"String?"},{n:"category",t:"ChemicalIngredientCategory"},{n:"function_",t:"ChemicalFunction"},
    {n:"percentageInProduct",t:"Double?"},{n:"origin",t:"ChemicalOrigin"},{n:"isSynthetic",t:"Bool"},
    {n:"euRegulatoryStatus",t:"EUChemicalStatus"},{n:"healthAssessment",t:"ChemicalHealthAssessment"},
    {n:"healthNotes",t:"String?"},{n:"sensitiveGroups",t:"[String]"},
    {n:"acceptableDailyIntakeKgBw",t:"Double?"},{n:"maxAllowedMgPerKg",t:"Double?"},
    {n:"actualMgPerKg",t:"Double?"},{n:"efsaEvaluationUrl",t:"String?"},{n:"allowedInOrganic",t:"Bool"},
    {n:"displayName",t:"String",comp:true},{n:"apiIdentifier",t:"String",comp:true},
  ]},

  // ── ENVIRONMENT ───────────────────────────────────────────────────
  {id:"TomapoEnvironmentSummary",g:"core",kind:"struct",fields:[
    {n:"co2ByPhase",t:"CO2ByPhase"},{n:"co2TotalKgPerKg",t:"Double?"},{n:"ecoscoreGrade",t:"String?"},{n:"ecoscoreScore",t:"Int?"},
    {n:"waterFootprintLiterPerKg",t:"Double?"},{n:"waterStressScore",t:"Double?"},
    {n:"forestFootprintM2PerKg",t:"Double?"},{n:"forestFootprintGrade",t:"String?"},{n:"deforestationRisk",t:"Double?"},
    {n:"transportEmissionsGramsCo2",t:"Double?"},{n:"totalTransportDistanceKm",t:"Double?"},{n:"transportLegCount",t:"Int?"},
    {n:"packagingCo2Kg",t:"Double?"},{n:"packagingScore",t:"Int?"},{n:"recyclablePackagingPercent",t:"Double?"},
    {n:"threatenedSpeciesRisk",t:"ThreatenedSpeciesRisk?"},{n:"productionSystemBonus",t:"Int?"},{n:"originEpiScore",t:"Int?"},
  ]},
  {id:"CO2ByPhase",g:"core",kind:"struct",fields:[
    {n:"agriculture",t:"Double?"},{n:"processing",t:"Double?"},{n:"transportation",t:"Double?"},
    {n:"packaging",t:"Double?"},{n:"distribution",t:"Double?"},{n:"consumption",t:"Double?"},
  ]},
  {id:"ThreatenedSpeciesRisk",g:"core",kind:"struct",fields:[
    {n:"ingredient",t:"String?"},{n:"ecoscorePenalty",t:"Int?"},{n:"explanation",t:"String?"},
  ]},
  {id:"TomapoCertification",g:"core",kind:"struct",fields:[
    {n:"id",t:"String"},{n:"type",t:"CertificationType"},{n:"name",t:"String"},{n:"issuingBody",t:"String?"},
    {n:"certificateNumber",t:"String?"},{n:"validFrom",t:"Date?"},{n:"validUntil",t:"Date?"},
    {n:"logoUrl",t:"String?"},{n:"verificationUrl",t:"String?"},{n:"scope",t:"CertificationScope"},
    {n:"source",t:"CertificationSource"},{n:"offLabelTag",t:"String?"},
    {n:"isCurrentlyValid",t:"Bool",comp:true},
  ]},

  // ── ALERTS ────────────────────────────────────────────────────────
  {id:"TomapoProductAlert",g:"alert",kind:"struct",fields:[
    {n:"id",t:"String"},{n:"barcode",t:"String"},{n:"batchId",t:"String?"},
    {n:"source",t:"AlertSource"},{n:"category",t:"AlertCategory"},{n:"severity",t:"AlertSeverity"},
    {n:"title",t:"String"},{n:"description",t:"String"},{n:"actionRequired",t:"String?"},
    {n:"referenceId",t:"String?"},{n:"moreInfoUrl",t:"String?"},
    {n:"authorId",t:"String?"},{n:"authorNickname",t:"String?"},
    {n:"authorAvatarUrl",t:"String?",note:"User-Avatar"},{n:"authorLogoUrl",t:"String?",note:"Firmen-Logo"},
    {n:"status",t:"AlertStatus"},{n:"confirmationCount",t:"Int"},{n:"rejectionCount",t:"Int"},
    {n:"createdAt",t:"Date"},{n:"updatedAt",t:"Date"},{n:"expiresAt",t:"Date?"},
    {n:"isActive",t:"Bool",comp:true},{n:"isFromUser",t:"Bool",comp:true},
    {n:"isOwnUserReport",t:"Bool",comp:true},{n:"isOfficial",t:"Bool",comp:true},
    {n:"isRecall",t:"Bool",comp:true},{n:"displayAuthor",t:"String",comp:true},
  ]},

  // ── STATION ───────────────────────────────────────────────────────
  {id:"TomapoStation",g:"station",kind:"struct",fields:[
    {n:"id",t:"String"},{n:"type",t:"TomapoStationType"},{n:"status",t:"TomapoStationStatus"},
    {n:"title",t:"String"},{n:"subtitle",t:"String?"},{n:"location",t:"TomapoLocation?"},
    {n:"startedAt",t:"Date?"},{n:"completedAt",t:"Date?"},{n:"durationHours",t:"Double?"},
    {n:"qualityChecks",t:"[TomapoQualityCheck]"},{n:"certificationIds",t:"[String]"},
    {n:"co2KgPerKg",t:"Double?",note:"Shortcut"},{n:"environmentSummary",t:"TomapoEnvironmentSummary?"},
    {n:"detail",t:"TomapoStationDetail"},{n:"isVerified",t:"Bool"},{n:"verifiedBy",t:"String?"},{n:"notes",t:"String?"},
    {n:"wasRefrigerated",t:"Bool",cold:true},{n:"refrigerationTemperatureCelsius",t:"Double?",cold:true},
    {n:"refrigerationLabel",t:"String",comp:true,cold:true},
  ]},
  {id:"TomapoLocation",g:"station",kind:"struct",fields:[
    {n:"name",t:"String?"},{n:"country",t:"String?",note:"ISO"},{n:"region",t:"String?"},
    {n:"city",t:"String?"},{n:"address",t:"String?"},{n:"latitude",t:"Double?"},{n:"longitude",t:"Double?"},
    {n:"embCode",t:"String?"},{n:"gln",t:"String?"},
  ]},
  {id:"TomapoStationDetail",g:"station",kind:"enum · 12 cases",
   cases:[".farming",".fishing",".harvest",".processing",".packaging",".storage",".coldStorage",".transport",".laboratory",".distribution",".retail",".generic"]},
  {id:"FarmingDetail",g:"station",kind:"struct",fields:[

// ── CONFIG ──────────────────────────────────────────────────────────
const NW = 256;
const GCOL = {
  off:'#388bfd', bridge:'#8957e5', tomapo:'#3fb950',
  cold:'#58c0fc', station:'#1D9E75', quality:'#BA7517',
  user:'#D4537E', enum:'#D85A30'
};
const GLABEL = {
  off:'Open Food Facts', bridge:'Bridge / App', tomapo:'Tomapo Core',
  cold:'Kühlkette', station:'StationDetails', quality:'QualityChecks',
  user:'User Layer', enum:'Enums'
};

// Zone layout: [col, row] in zone-grid
const ZPOS = {
  off:[0,0], bridge:[1,0], tomapo:[2,0], cold:[3,0],
  station:[0,1], quality:[1,1], user:[2,1], enum:[3,1]
};
const NODE_H = 36, VGAP = 8, HGAP = 20;
const ZONE_ROWS = 18;  // nodes per column before wrapping
const ZONE_W = 2*(NW+HGAP) + 40;  // 2 sub-cols per zone
const ZONE_H = ZONE_ROWS*(NODE_H+VGAP) + 64;
const ZONE_GAP_X = 32, ZONE_GAP_Y = 40;

// ── BUILD CONNECTIVITY MAP ──────────────────────────────────────────
const connMap = {};  // id → [{dir:'out'|'in', edge, other}]
MODEL.edges.forEach(e => {
  if (!connMap[e.f]) connMap[e.f] = [];
  if (!connMap[e.t]) connMap[e.t] = [];
  connMap[e.f].push({dir:'out', label:e.l, other:e.t});
  connMap[e.t].push({dir:'in',  label:e.l, other:e.f});
});

// ── COMPUTE POSITIONS ───────────────────────────────────────────────
function computePositions() {
  const cnt = {}, pos = {};
  MODEL.nodes.forEach(n => {
    const g = n.g;
    cnt[g] = cnt[g] || 0;
    const i = cnt[g]++;
    const [zc, zr] = ZPOS[g] || [0,0];
    const sc = Math.floor(i / ZONE_ROWS);   // sub-col within zone
    const sr = i % ZONE_ROWS;               // row within sub-col
    pos[n.id] = {
      x: zc*(ZONE_W+ZONE_GAP_X) + sc*(NW+HGAP) + 20,
      y: zr*(ZONE_H+ZONE_GAP_Y) + sr*(NODE_H+VGAP) + 54
    };
  });
  return pos;
}

// ── STATE ────────────────────────────────────────────────────────────
let positions = {};
const nodeEls = {};
let visGroups = new Set(MODEL.groups.map(g => g.id));
let searchQ = '';
let activeId = null;
let scale=1, panX=0, panY=0;
let dragging=false, lastMX=0, lastMY=0;

// ── BUILD NODE ───────────────────────────────────────────────────────
function buildNode(n) {
  const p = positions[n.id];
  const el = document.createElement('div');
  el.className = `node g-${n.g}`;
  el.id = 'n-' + n.id;
  el.style.left = p.x + 'px';
  el.style.top  = p.y + 'px';

  const cc = (connMap[n.id] || []).length;
  const badge = cc ? `<span class="nbadge" title="${cc} Verbindungen">${cc}</span>` : '';

  let html = `<div class="nh">
    <div class="na"></div>
    <span class="ntitle">${n.id}</span>
    <span class="nkind">${n.kind}</span>
    ${badge}
  </div>`;

  if (n.fields?.length) {
    html += '<div class="nf">';
    n.fields.forEach(f => {
      const fc = f.cold ? ' ice' : f.comp ? ' dim' : '';
      html += `<div class="frow">
        <span class="fn${fc}">${f.n}</span>
        ${f.note ? `<span class="fnt">${f.note}</span>` : ''}
        <span class="ft">${f.t || ''}</span>
      </div>`;
    });
    html += '</div>';
  }
  if (n.cases?.length) {
    html += '<div class="ecases">';
    n.cases.forEach(c => { html += `<span class="ec">${c}</span>`; });
    html += '</div>';
  }

  el.innerHTML = html;

  // Badge click → show panel
  const badgeEl = el.querySelector('.nbadge');
  if (badgeEl) {
    badgeEl.addEventListener('click', ev => {
      ev.stopPropagation();
      selectNode(n.id);
    });
  }

  // Node click → toggle fields
  el.addEventListener('click', ev => {
    ev.stopPropagation();
    el.classList.toggle('open');
  });

  return el;
}

// ── RENDER ───────────────────────────────────────────────────────────
function renderAll() {
  positions = computePositions();
  const world = document.getElementById('world');

  // Group labels
  const groupFirstPos = {};
  MODEL.nodes.forEach(n => {
    if (!groupFirstPos[n.g]) groupFirstPos[n.g] = positions[n.id];
  });
  Object.entries(groupFirstPos).forEach(([g, p]) => {
    const lbl = document.createElement('div');
    lbl.className = 'glabel';
    lbl.style.left = p.x + 'px';
    lbl.style.top  = (p.y - 22) + 'px';
    lbl.style.color = GCOL[g] || '#888';
    lbl.textContent = GLABEL[g] || g;
    world.appendChild(lbl);
  });

  // Nodes
  MODEL.nodes.forEach(n => {
    const el = buildNode(n);
    world.appendChild(el);
    nodeEls[n.id] = el;
  });

  resetView();
  updateInfo();
}

// ── PANEL ────────────────────────────────────────────────────────────
function selectNode(id) {
  // Deselect previous
  if (activeId && nodeEls[activeId]) {
    nodeEls[activeId].classList.remove('sel');
  }
  // Reset dim/rel
  Object.values(nodeEls).forEach(el => el.classList.remove('sel','rel','dim'));

  if (activeId === id) {
    activeId = null;
    closePanel();
    return;
  }
  activeId = id;

  const el = nodeEls[id];
  if (el) el.classList.add('sel');

  // Dim all, highlight connected
  const connected = new Set([id]);
  (connMap[id] || []).forEach(c => connected.add(c.other));
  Object.entries(nodeEls).forEach(([nid, nel]) => {
    if (nel.style.display === 'none') return;
    if (!connected.has(nid)) nel.classList.add('dim');
    else if (nid !== id) nel.classList.add('rel');
  });

  openPanel(id);
}

function openPanel(id) {
  const node = MODEL.nodes.find(n => n.id === id);
  if (!node) return;

  document.getElementById('ph-name').textContent = node.id;
  document.getElementById('ph-kind').textContent = node.kind;

  const conns = connMap[id] || [];
  const plist = document.getElementById('plist');
  const pempty = document.getElementById('pempty');

  if (!conns.length) {
    plist.innerHTML = '<div id="pempty">Keine Verbindungen</div>';
    document.getElementById('panel').classList.add('open');
    return;
  }

  const outgoing = conns.filter(c => c.dir === 'out');
  const incoming = conns.filter(c => c.dir === 'in');

  let html = '';

  if (outgoing.length) {
    html += `<div class="psec">Verweist auf (${outgoing.length})</div>`;
    outgoing.forEach(c => {
      const other = MODEL.nodes.find(n => n.id === c.other);
      const col = GCOL[other?.g] || '#888';
      html += `<div class="prow" onclick="jumpTo('${c.other}')">
        <div class="prow-label">→ ${c.label || ''}</div>
        <div class="prow-name">
          <div class="dot" style="background:${col}"></div>
          ${c.other}
        </div>
        <div class="prow-rel">${other?.kind || ''}</div>
      </div>`;
    });
  }

  if (incoming.length) {
    html += `<div class="psec">Referenziert von (${incoming.length})</div>`;
    incoming.forEach(c => {
      const other = MODEL.nodes.find(n => n.id === c.other);
      const col = GCOL[other?.g] || '#888';
      html += `<div class="prow" onclick="jumpTo('${c.other}')">
        <div class="prow-label">← ${c.label || ''}</div>
        <div class="prow-name">
          <div class="dot" style="background:${col}"></div>
          ${c.other}
        </div>
        <div class="prow-rel">${other?.kind || ''}</div>
      </div>`;
    });
  }

  plist.innerHTML = html;
  document.getElementById('panel').classList.add('open');
  updateInfo(id, conns.length);
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  Object.values(nodeEls).forEach(el => el.classList.remove('sel','rel','dim'));
  activeId = null;
  updateInfo();
}

function jumpTo(id) {
  const el = nodeEls[id];
  if (!el) return;
  // Scroll to node: pan so it's centred
  const p = positions[id];
  const cr = document.getElementById('cv').getBoundingClientRect();
  panX = cr.width/2  - (p.x + 128) * scale;
  panY = cr.height/2 - (p.y +  18) * scale;
  applyTransform();
  // Flash highlight
  el.style.transition = 'box-shadow .1s';
  el.style.boxShadow = '0 0 0 3px #58a6ff';
  setTimeout(() => { el.style.boxShadow = ''; }, 800);
}

// ── FILTERS ──────────────────────────────────────────────────────────
function applyFilters() {
  MODEL.nodes.forEach(n => {
    const vis = visGroups.has(n.g) && (!searchQ ||
      n.id.toLowerCase().includes(searchQ) ||
      (n.fields||[]).some(f =>
        f.n.toLowerCase().includes(searchQ) ||
        (f.note||'').toLowerCase().includes(searchQ)
      ) ||
      (n.cases||[]).some(c => c.toLowerCase().includes(searchQ))
    );
    nodeEls[n.id].style.display = vis ? '' : 'none';
  });
  updateInfo();
}

function doSearch() {
  searchQ = document.getElementById('search').value.toLowerCase().trim();
  applyFilters();
}

function toggleTag(el) {
  const g = el.dataset.g;
  if (visGroups.has(g)) { visGroups.delete(g); el.classList.replace('on','off'); }
  else                   { visGroups.add(g);    el.classList.replace('off','on'); }
  applyFilters();
}

function updateInfo(id, n) {
  const vis = MODEL.nodes.filter(n => nodeEls[n.id]?.style.display !== 'none').length;
  const el  = document.getElementById('inf');
  if (id) {
    el.textContent = `${id} · ${n} Verbindungen`;
    el.style.color = '#79c0ff';
  } else {
    el.textContent = `${vis} / ${MODEL.nodes.length} Structs · Klick = Felder · Badge = Verbindungen`;
    el.style.color = '#484f58';
  }
}

// ── PAN & ZOOM ────────────────────────────────────────────────────────
const cv    = document.getElementById('cv');
const world = document.getElementById('world');

cv.addEventListener('mousedown', e => {
  if (e.target.closest('.node') || e.target.closest('#panel')) return;
  dragging = true; lastMX = e.clientX; lastMY = e.clientY;
  cv.classList.add('grab');
  closePanel();
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  panX += e.clientX - lastMX; panY += e.clientY - lastMY;
  lastMX = e.clientX; lastMY = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; cv.classList.remove('grab'); });

cv.addEventListener('wheel', e => {
  e.preventDefault();
  const r  = cv.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const d  = e.deltaY < 0 ? 1.12 : 0.9;
  const ns = Math.min(2, Math.max(0.06, scale * d));
  panX = mx - (mx - panX) * (ns / scale);
  panY = my - (my - panY) * (ns / scale);
  scale = ns;
  applyTransform();
}, {passive: false});

function applyTransform() {
  world.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
}

function resetView() {
  const r    = cv.getBoundingClientRect();
  const allP = Object.values(positions);
  const maxX = Math.max(...allP.map(p => p.x)) + NW + 40;
  const maxY = Math.max(...allP.map(p => p.y)) + 60;
  scale = Math.min(r.width / maxX, r.height / maxY, 1) * 0.88;
  panX  = (r.width - maxX * scale) / 2;
  panY  = 10;
  applyTransform();
}

// ── INIT ──────────────────────────────────────────────────────────────
renderAll();
</script>
</body>

    Anomaly:
      type: object
      properties:
        severity:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
        category:
          type: string
          example: coldChain
        field:
          type: string
          example: hadColdChainBreak
        value:
          example: 1
        expected:
          example: 0
    Sustainability:
      type: object
      properties:
        co2TotalKgPerKg:
          type: number
        ecoscoreGrade:
          type: string
          enum:
          - a
          - b
          - c
          - d
          - e
        transportEmissionsGramsCo2:
          type: integer
        co2ByPhase:
          type: object
          properties:
            agriculture:
              type: number
            processing:
              type: number
            transportation:
              type: number
            packaging:
              type: number
    AnalyzeResponse:
      type: object
      properties:
        batchId:
          type: string
        riskScore:
          type: integer
          minimum: 0
          maximum: 100
        riskLevel:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
        recommendation:
          type: string
          enum:
          - approve
          - inspect
          - quarantine
          - do_not_sell
        anomalies:
          type: array
          items:
            $ref: '#/components/schemas/Anomaly'
        sustainability:
          $ref: '#/components/schemas/Sustainability'
        summary:
          type: string
          description: LLM-generierte Zusammenfassung in der Sprache der Anfrage
      example:
        batchId: batch-warn-002
        riskScore: 57
        riskLevel: high
        recommendation: quarantine
        anomalies:
        - severity: high
          category: coldChain
          field: hadColdChainBreak
          value: 1
          expected: 0
        - severity: medium
          category: temperature
          field: tempIsWithinRange
          value: 0
          expected: 1
        sustainability:
          co2TotalKgPerKg: 0.061
          ecoscoreGrade: a
          transportEmissionsGramsCo2: 5152
        summary: Batch zeigt einen Kühlkettenbruch auf 9.5°C für 75 Minuten. Quarantäne
          empfohlen.
    ChatMessage:
      type: object
      required:
      - role
      - content
      properties:
        role:
          type: string
          enum:
          - user
          - assistant
        content:
          type: string
    ChatRequest:
      type: object
      required:
      - batchId
      - productId
      - chatHistory
      properties:
        batchId:
          type: string
          example: batch-warn-002
        productId:
          type: string
          example: prod-fish-002
        chatHistory:
          type: array
          description: Vollständige Konversationshistorie — neueste Nachricht zuletzt
          items:
            $ref: '#/components/schemas/ChatMessage'
        batchContext:
          type: object
          nullable: true
          description: 'Volle /analyze Response. Service liest: riskScore, riskLevel,
            recommendation, anomalies, sustainability.'
          allOf:
          - $ref: '#/components/schemas/AnalyzeResponse'
        productInfo:
          type: object
          nullable: true
          description: 'Produktobjekt aus DB. Service extrahiert: productName, brands,
            productQuantity+Unit, categoriesTags[0-1], countriesTags[0-2], nutriscoreGrade,
            ecoscoreGrade, novaGroup, nutrientLevels, allergensTags[0-9], labelsTags[0-4],
            requiresColdChain, activeAlerts[0-1], traceabilityScore.completeness.'
          properties:
            productName:
              type: string
            genericName:
              type: string
            brands:
              type: string
            productQuantity:
              type: number
            productQuantityUnit:
              type: string
            categoriesTags:
              type: array
              items:
                type: string
            countriesTags:
              type: array
              items:
                type: string
            nutriscoreGrade:
              type: string
            ecoscoreGrade:
              type: string
            novaGroup:
              type: integer
            nutrientLevels:
              type: object
            allergensTags:
              type: array
              items:
                type: string
            labelsTags:
              type: array
              items:
                type: string
            requiresColdChain:
              type: boolean
            activeAlerts:
              type: array
              items:
                type: object
            traceabilityScore:
              type: object
      example:
        batchId: batch-warn-002
        productId: prod-fish-002
        chatHistory:
        - role: user
          content: Warum wurde diese Charge als hohes Risiko eingestuft?
        batchContext:
          batchId: batch-warn-002
          riskScore: 57
          riskLevel: high
          recommendation: quarantine
          anomalies: []
          sustainability: {}
          summary: '...'
paths:
  /health:
    get:
      tags:
      - Health
      summary: Health Check
      description: Prüft ob der FastAPI Service und Ollama erreichbar sind.
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /analyze:
    post:
      tags:
      - Analysis
      summary: Batch analysieren — ML Anomalie-Erkennung
      description: 'Empfängt alle 99 flachen Felder einer Trace-Batch. Führt Isolation
        Forest ML-Analyse durch, wendet Anomalie-Regeln an, berechnet riskScore (0-100),
        riskLevel, recommendation und generiert eine LLM-Zusammenfassung.


        **Felder:** Alle 99 Felder sind REQUIRED. Booleans als 0/1 kodiert. Null/fehlende
        Werte als 0 senden.


        **Fehler 422:** Pydantic Validierungsfehler — ein Feld fehlt oder hat falschen
        Typ. Fehlermeldung zeigt welches Feld.


        **Fehler 500:** Ollama nicht gestartet oder Modell nicht geladen.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntelligenceRequest'
      responses:
        '200':
          description: Analyse-Ergebnis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeResponse'
        '422':
          description: Pydantic Validierungsfehler — fehlendes oder falsch typisiertes
            Feld
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: array
                    items:
                      type: object
                      properties:
                        loc:
                          type: array
                        msg:
                          type: string
                        type:
                          type: string
        '500':
          description: Ollama nicht erreichbar oder Modell nicht geladen
  /chat:
    post:
      tags:
      - Chat
      summary: AI-Chat über ein Produkt und Batch (Streaming)
      description: 'Streaming-Endpoint. Gibt `text/plain` Stream zurück — kein JSON.
        Das LLM antwortet automatisch in der Sprache der Frage (DE → DE, EN → EN,
        FR → FR).


        **chatHistory:** Vollständige Konversationshistorie beider Rollen, neueste
        Nachricht zuletzt.


        **batchContext:** Volle `/analyze` Response direkt übergeben.


        **productInfo:** Vollständiges Produktobjekt. Service filtert intern relevante
        Felder — alle anderen Felder werden ignoriert.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Streaming text/plain Antwort
          content:
            text/plain:
              schema:
                type: string
                example: Die Charge zeigt ein hohes Risiko aufgrund eines Kühlkettenbruchs
                  von 75 Minuten...
        '422':
          description: Validierungsfehler
        '500':
          description: Ollama nicht erreichbar

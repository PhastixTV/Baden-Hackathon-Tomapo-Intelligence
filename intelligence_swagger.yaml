openapi: 3.0.3
info:
  title: Tomapo Intelligence API
  version: 1.0.0
  description: Tomapo Intelligence ML Microservice — Anomalie-Erkennung, Nachhaltigkeitsanalyse
    und AI-Chat. Läuft als Python FastAPI Service auf Port 8000. Keine Authentifizierung
    erforderlich (interner Service).
servers:
- url: http://localhost:8000
  description: Local ML Service
tags:
- name: Analysis
  description: Batch-Analyse und Anomalie-Erkennung
- name: Chat
  description: AI-Chat Streaming
- name: Health
  description: Health Check
